<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage cookie consent preferences for the PurpleWave site." />
  <title>Cookie Consent</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #09040f; color: #e6e2ff; }
    .consent-panel { max-width: 540px; margin: 4rem auto; padding: 2rem; background: rgba(18,9,36,0.95); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; }
    h1 { margin-top: 0; }
    p { color: #b9a8ff; line-height: 1.8; }
    .consent-actions { display: flex; flex-wrap: wrap; gap: 0.85rem; margin-top: 1.5rem; }
    .consent-actions button { border: none; border-radius: 999px; padding: 0.9rem 1.5rem; cursor: pointer; font-weight: 700; }
    .accept { background: #8b5cf6; color: white; }
    .decline { background: #3f3f46; color: white; }
    .manage { background: rgba(255,255,255,0.08); color: #fff; }
  </style>
</head>
<body>
  <article class="consent-panel">
    <h1>Cookie consent</h1>
    <p>We use minimal cookies for site performance and contact form functionality. You can accept all, decline non-essential cookies, or manage preferences.</p>
    <div class="consent-actions">
      <button class="accept" onclick="alert('Cookies accepted.');">Accept all</button>
      <button class="decline" onclick="alert('Non-essential cookies declined.');">Decline</button>
      <button class="manage" onclick="alert('Manage preferences on this site.');">Manage preferences</button>
    </div>
  </article>
</body>
</html>
